[Editor]
; Primary editor command.
; Examples:
;   notepad
;   nano
;   vim
;   code --wait
;   notepad++
Command=notepad

; If true, launch through the system shell.
; Needed for compound commands like: code --wait
; Usually false for plain executables like notepad or nano.
UseShell=false

; If true, DotTalk++ waits until the editor exits before continuing.
; For memo editing, this should normally stay true.
Wait=true

; Optional working directory for the editor process.
; Leave blank to use the normal process/default directory.
WorkingDir=

; Optional directory for temporary memo edit files.
; Leave blank to use the OS temp directory.
TempDir=

; File extension used for temp edit files.
TempExtension=.txt

; Prefix used when creating temp memo files.
TempPrefix=dottalk_memo_

; Keep temp files after edit for debugging/troubleshooting.
KeepTempFiles=false

; Encoding written to temp files.
; Suggested values:
;   ansi
;   utf8
;   utf8bom
Encoding=ansi

; Normalize line endings after reading edited text back.
; Suggested values:
;   native
;   crlf
;   lf
LineEndings=native

; Strip one trailing newline that many editors leave at EOF.
TrimFinalNewline=false

; Maximum temp file size to read back, in bytes.
; 0 means no explicit limit.
MaxFileSize=0

; Optional timeout in seconds when Wait=true.
; 0 means wait indefinitely.
TimeoutSeconds=0

; Optional alternate editor if Command is blank or fails.
FallbackCommand=

; Optional arguments template if you later split command and args.
; Use {file} as placeholder.
; Example:
;   --wait {file}
Args=

; Optional alternate shell command template.
; Use {file} as placeholder.
; Example:
;   code --wait "{file}"
ShellCommand=

; Controls whether DotTalk++ echoes which editor/file it launched.
Verbose=false